<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameWarden - 401 Unauthorised</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0808; --surface: #1a0f0f;
  --border: rgba(255,255,255,0.07); --border-bright: rgba(255,255,255,0.13);
  --text: #f8f0f0; --text-2: #aa8888; --text-3: #664444;
  --accent: #ff3333; --accent-dim: rgba(255,51,51,0.12); --accent-glow: rgba(255,51,51,0.30);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }
.bg-glow-left { position: fixed; top: -10%; left: -10%; width: 600px; height: 600px; background: radial-gradient(ellipse, rgba(255,51,51,0.055) 0%, transparent 65%); pointer-events: none; animation: driftLeft 12s ease-in-out infinite alternate; }
.bg-glow-right { position: fixed; bottom: -10%; right: -5%; width: 500px; height: 500px; background: radial-gradient(ellipse, rgba(255,51,51,0.035) 0%, transparent 65%); pointer-events: none; animation: driftRight 14s ease-in-out infinite alternate; }
@keyframes driftLeft { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
@keyframes driftRight { from { transform: translate(0,0); } to { transform: translate(-30px,-20px); } }
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px); background-size: 64px 64px; pointer-events: none; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%); }
.container { position: relative; z-index: 1; text-align: center; padding: 20px; animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.error-code {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: clamp(7rem, 20vw, 11rem); font-weight: 900;
  letter-spacing: -0.06em; line-height: 1;
  background: linear-gradient(180deg, #ff3333 0%, rgba(255,51,51,0.15) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  position: relative; margin-bottom: 4px;
  filter: drop-shadow(0 0 40px rgba(255,51,51,0.25));
}
.error-code::after {
  content: '401'; position: absolute; inset: 0;
  font-family: 'Cabinet Grotesk', sans-serif; font-size: inherit; font-weight: 900; letter-spacing: inherit;
  -webkit-text-fill-color: transparent; -webkit-text-stroke: 1px rgba(255,51,51,0.15);
  filter: blur(8px); z-index: -1;
}
.badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-dim); border: 1px solid rgba(255,51,51,0.2); border-radius: 100px; padding: 4px 12px; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
h1 { font-family: 'Cabinet Grotesk', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 10px; }
.subtitle { font-size: 0.85rem; color: var(--text-2); line-height: 1.65; max-width: 340px; margin: 0 auto 32px; }
.actions { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
.btn-home { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.2s; box-shadow: 0 0 20px var(--accent-glow); }
.btn-home:hover { background: #ff5555; transform: translateY(-1px); box-shadow: 0 0 30px var(--accent-glow); }
.btn-home svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.btn-back { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; background: transparent; color: var(--text-3); border: 1px solid var(--border); border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
.btn-back:hover { color: var(--text-2); border-color: var(--border-bright); }
.btn-back svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="bg-glow-left"></div>
<div class="bg-glow-right"></div>
<div class="bg-grid"></div>
<div class="container">
  <div class="error-code">401</div>
  <div class="badge">Unauthorised</div>
  <h1>Authentication required.</h1>
  <p class="subtitle">You need to be logged in to access this. Please sign in and try again.</p>
  <div class="actions">
    <a class="btn-home" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Home
    </a>
    <a class="btn-back" href="javascript:history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Go Back
    </a>
  </div>
</div>
</body>
</html>
