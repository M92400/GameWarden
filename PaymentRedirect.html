<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameWarden - Payment Redirect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0808;
  --surface: #1a0f0f;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.13);
  --text: #f8f0f0;
  --text-2: #aa8888;
  --text-3: #664444;
  --accent: #ff3333;
  --accent-glow: rgba(255,51,51,0.30);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}


.bg-glow-left {
  position: fixed; top: -10%; left: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(ellipse, rgba(255,51,51,0.055) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
  animation: driftLeft 12s ease-in-out infinite alternate;
}
.bg-glow-right {
  position: fixed; bottom: -10%; right: -5%;
  width: 500px; height: 500px;
  background: radial-gradient(ellipse, rgba(88,101,242,0.05) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
  animation: driftRight 14s ease-in-out infinite alternate;
}
@keyframes driftLeft { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
@keyframes driftRight { from { transform: translate(0,0); } to { transform: translate(-30px,-20px); } }
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}

nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw; height: 62px;
  background: rgba(12,8,8,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--text);
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 900; font-size: 1.15rem; letter-spacing: -0.02em;
}
.logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, #ff3333, #b30000);
  display: grid; place-items: center;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 900; font-size: 0.82rem; color: #fff;
  box-shadow: 0 0 18px rgba(255,51,51,0.45);
}

main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 20px;
  position: relative; z-index: 1;
}

.card {
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 20px;
  padding: 52px 40px 48px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.55);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card-shine {
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 50%, transparent);
}
.card-corner-glow {
  position: absolute; top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(ellipse, rgba(255,51,51,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.spinner-wrap {
  position: relative; width: 64px; height: 64px;
  margin-bottom: 28px;
  animation: fadeUp 0.4s 0.15s ease both;
}
.spinner-ring {
  width: 64px; height: 64px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.06);
  border-top-color: var(--accent);
  animation: spin 0.9s cubic-bezier(0.4,0,0.2,1) infinite;
  box-shadow: 0 0 18px rgba(255,51,51,0.2);
}
.spinner-inner {
  position: absolute; inset: 10px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.04);
  border-bottom-color: rgba(255,51,51,0.35);
  animation: spinReverse 1.4s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes spin        { to { transform: rotate(360deg); } }
@keyframes spinReverse { to { transform: rotate(-360deg); } }

.redirect-title {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em;
  margin-bottom: 8px;
  animation: fadeUp 0.4s 0.2s ease both;
}
.redirect-sub {
  font-size: 0.855rem; color: var(--text-2); line-height: 1.6;
  animation: fadeUp 0.4s 0.25s ease both;
}

.dots span {
  display: inline-block;
  animation: dotBounce 1.4s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { opacity: 0.3; }
  40%           { opacity: 1; }
}

.progress-wrap {
  width: 100%; height: 3px; border-radius: 100px;
  background: rgba(255,255,255,0.06);
  margin-top: 32px; overflow: hidden;
  animation: fadeUp 0.4s 0.3s ease both;
}
.progress-bar {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, #b30000, var(--accent));
  box-shadow: 0 0 10px var(--accent-glow);
  animation: progressFill 3s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes progressFill {
  0%   { width: 0%; }
  60%  { width: 75%; }
  85%  { width: 88%; }
  100% { width: 95%; }
}

.secure-note {
  display: flex; align-items: center; gap: 7px;
  margin-top: 24px; font-size: 0.75rem; color: var(--text-3);
  animation: fadeUp 0.4s 0.35s ease both;
}
.secure-note svg { width: 13px; height: 13px; stroke: var(--text-3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

footer {
  position: relative; z-index: 1;
  border-top: 1px solid var(--border);
  padding: 20px 5vw;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 0.77rem; color: var(--text-3); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: var(--text-2); }
.footer-copy { font-size: 0.75rem; color: var(--text-3); }

@media (max-width: 500px) {
  .card { padding: 44px 24px 40px; }
  footer { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="bg-glow-left"></div>
<div class="bg-glow-right"></div>
<div class="bg-grid"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <div class="logo-mark">GW</div>
    GameWarden
  </a>
</nav>

<!-- MAIN -->
<main>
  <div class="card">
    <div class="card-shine"></div>
    <div class="card-corner-glow"></div>

    <div class="spinner-wrap">
      <div class="spinner-ring"></div>
      <div class="spinner-inner"></div>
    </div>

    <div class="redirect-title">Redirecting<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <p class="redirect-sub">Taking you to our secure payment provider.<br>Please don't close this tab.</p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="secure-note">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Secured with SSL encryption
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <a class="nav-logo" href="index.html" style="font-size:0.9rem;">
    <div class="logo-mark" style="width:24px;height:24px;font-size:0.65rem;border-radius:6px;">GW</div>
    GameWarden
  </a>
  <div class="footer-links">
    <a href="Privacy.html">Privacy</a>
    <a href="TOS.html">Terms</a>
    <a href="#">Support</a>
  </div>
  <div class="footer-copy">© 2026 GameWarden. All rights reserved.</div>
</footer>

</body>
</html>
