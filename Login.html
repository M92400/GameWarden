<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameWarden - Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0808;
  --bg-2: #110a0a;
  --surface: #1a0f0f;
  --surface-2: #201414;
  --surface-3: #2a1a1a;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.13);
  --text: #f8f0f0;
  --text-2: #aa8888;
  --text-3: #664444;
  --accent: #ff3333;
  --accent-dim: rgba(255,51,51,0.12);
  --accent-glow: rgba(255,51,51,0.30);
  --discord: #5865F2;
  --discord-hover: #6d79f5;
  --discord-glow: rgba(88,101,242,0.35);
  --error: #ff5555;
  --error-dim: rgba(255,85,85,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-glow-left {
  position: fixed; top: -10%; left: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(ellipse, rgba(255,51,51,0.055) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
  animation: driftLeft 12s ease-in-out infinite alternate;
}
.bg-glow-right {
  position: fixed; bottom: -10%; right: -5%;
  width: 500px; height: 500px;
  background: radial-gradient(ellipse, rgba(88,101,242,0.05) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
  animation: driftRight 14s ease-in-out infinite alternate;
}
@keyframes driftLeft { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
@keyframes driftRight { from { transform: translate(0,0); } to { transform: translate(-30px,-20px); } }
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}

nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw; height: 62px;
  background: rgba(12,8,8,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--text);
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 900; font-size: 1.15rem; letter-spacing: -0.02em;
}
.logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, #ff3333, #b30000);
  display: grid; place-items: center;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 900; font-size: 0.82rem; color: #fff;
  box-shadow: 0 0 18px rgba(255,51,51,0.45);
}
.nav-right {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.83rem; color: var(--text-3);
}
.nav-right a {
  color: var(--accent); text-decoration: none; font-weight: 600;
  transition: opacity 0.2s;
}
.nav-right a:hover { opacity: 0.8; }

main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 20px;
  position: relative; z-index: 1;
}

.card {
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 20px;
  padding: 44px 40px 40px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.55);
  position: relative; overflow: hidden;
  animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(28px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card-shine {
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 50%, transparent);
}
.card-corner-glow {
  position: absolute; top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(ellipse, rgba(255,51,51,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.card-icon {
  width: 52px; height: 52px; border-radius: 13px;
  background: linear-gradient(135deg, #ff3333, #b30000);
  display: grid; place-items: center; margin-bottom: 22px;
  box-shadow: 0 0 24px rgba(255,51,51,0.35);
  animation: iconPop 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes iconPop {
  from { opacity: 0; transform: scale(0.6); }
  to   { opacity: 1; transform: scale(1); }
}
.card-icon svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

.card-title {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 1.65rem; font-weight: 900; letter-spacing: -0.035em;
  line-height: 1.1; margin-bottom: 7px;
  animation: fadeUp 0.4s 0.15s ease both;
}
.card-sub {
  font-size: 0.875rem; color: var(--text-2); line-height: 1.6;
  margin-bottom: 28px;
  animation: fadeUp 0.4s 0.2s ease both;
}

.btn-discord {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 11px;
  padding: 13px 24px; border-radius: 10px;
  background: var(--discord); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 700;
  cursor: pointer; text-decoration: none; border: none;
  box-shadow: 0 0 24px var(--discord-glow), 0 4px 14px rgba(0,0,0,0.3);
  transition: all 0.2s; position: relative; overflow: hidden;
  margin-bottom: 22px;
  animation: fadeUp 0.4s 0.25s ease both;
}
.btn-discord::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s ease;
}
.btn-discord:hover::before { left: 150%; }
.btn-discord:hover {
  background: var(--discord-hover);
  transform: translateY(-2px);
  box-shadow: 0 0 36px rgba(88,101,242,0.5), 0 8px 20px rgba(0,0,0,0.35);
}
.btn-discord:active { transform: translateY(0); }
.btn-discord svg { width: 20px; height: 20px; flex-shrink: 0; }

.or-divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
  animation: fadeUp 0.4s 0.28s ease both;
}
.or-divider-line { flex: 1; height: 1px; background: var(--border); }
.or-divider-text { font-size: 0.7rem; color: var(--text-3); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

.error-banner {
  display: none; align-items: center; gap: 10px;
  background: var(--error-dim); border: 1px solid rgba(255,85,85,0.2);
  border-radius: 9px; padding: 11px 14px;
  font-size: 0.82rem; color: var(--error);
  margin-bottom: 16px;
}
.error-banner.visible { display: flex; animation: shakeIn 0.35s ease both; }
.error-banner svg { width: 15px; height: 15px; stroke: var(--error); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
@keyframes shakeIn {
  0%   { transform: translateX(-6px); opacity: 0; }
  40%  { transform: translateX(4px); }
  70%  { transform: translateX(-2px); }
  100% { transform: translateX(0); opacity: 1; }
}

.form { display: flex; flex-direction: column; gap: 14px; animation: fadeUp 0.4s 0.3s ease both; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 0.78rem; font-weight: 600; color: var(--text-2); letter-spacing: 0.02em; }
.field-wrap { position: relative; }
.field-icon {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
}
.field-icon svg { width: 15px; height: 15px; stroke: var(--text-3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; display: block; }
.field-wrap:focus-within .field-icon svg { stroke: var(--text-2); }

.field input {
  width: 100%; padding: 11px 14px 11px 40px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.875rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field input::placeholder { color: var(--text-3); }
.field input:focus {
  border-color: rgba(255,51,51,0.4);
  box-shadow: 0 0 0 3px rgba(255,51,51,0.1);
}
.field.error input {
  border-color: rgba(255,85,85,0.5);
  box-shadow: 0 0 0 3px var(--error-dim);
}
.field-error-msg { font-size: 0.72rem; color: var(--error); display: none; }
.field.error .field-error-msg { display: block; }

.toggle-pw {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 4px;
  color: var(--text-3); transition: color 0.2s;
  display: flex; align-items: center;
}
.toggle-pw:hover { color: var(--text-2); }
.toggle-pw svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.field-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px;
  animation: fadeUp 0.4s 0.32s ease both;
}
.remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.remember input[type="checkbox"] { display: none; }
.checkmark {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1px solid var(--border-bright); background: var(--surface-2);
  display: grid; place-items: center; flex-shrink: 0; transition: all 0.15s;
}
.remember input:checked ~ .checkmark { background: var(--accent); border-color: var(--accent); }
.checkmark svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity 0.15s; }
.remember input:checked ~ .checkmark svg { opacity: 1; }
.remember-label { font-size: 0.8rem; color: var(--text-2); user-select: none; }
.forgot { font-size: 0.8rem; color: var(--text-2); text-decoration: none; transition: color 0.2s; }
.forgot:hover { color: var(--accent); }

.btn-submit {
  width: 100%; padding: 13px; border-radius: 10px;
  background: var(--accent); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 700;
  border: none; cursor: pointer;
  box-shadow: 0 0 22px var(--accent-glow);
  transition: all 0.2s; position: relative; overflow: hidden;
  margin-top: 18px;
  animation: fadeUp 0.4s 0.34s ease both;
}
.btn-submit::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transition: left 0.5s ease;
}
.btn-submit:hover::before { left: 150%; }
.btn-submit:hover { background: #ff5555; transform: translateY(-2px); box-shadow: 0 0 36px rgba(255,51,51,0.5); }
.btn-submit:active { transform: translateY(0); }
.btn-submit.loading { pointer-events: none; opacity: 0.75; }
.spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-submit.loading .btn-label { display: none; }
.btn-submit.loading .spinner { display: block; }

.signup-link {
  text-align: center; margin-top: 22px;
  font-size: 0.82rem; color: var(--text-3);
  animation: fadeUp 0.4s 0.38s ease both;
}
.signup-link a { color: var(--text-2); text-decoration: underline; text-underline-offset: 3px; transition: color 0.2s; }
.signup-link a:hover { color: var(--text); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

footer {
  position: relative; z-index: 1;
  border-top: 1px solid var(--border);
  padding: 20px 5vw;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 0.77rem; color: var(--text-3); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: var(--text-2); }
.footer-copy { font-size: 0.75rem; color: var(--text-3); }

@media (max-width: 500px) {
  .card { padding: 36px 24px 32px; }
  footer { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="bg-glow-left"></div>
<div class="bg-glow-right"></div>
<div class="bg-grid"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <div class="logo-mark">GW</div>
    GameWarden
  </a>
  <div class="nav-right">
    Don't have an account?&nbsp;<a href="Register.html">Sign up</a>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="card">
    <div class="card-shine"></div>
    <div class="card-corner-glow"></div>

    <div class="card-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <div class="card-title">Welcome back</div>
    <p class="card-sub">Log in to your GameWarden dashboard to manage your games, bans, and detection settings.</p>

    <!-- Discord -->
    <a href="https://discord.com/oauth2/authorize?client_id=YOUR_CLIENT_ID&redirect_uri=YOUR_REDIRECT_URI&response_type=code&scope=identify%20email" class="btn-discord">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.043.031.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Continue with Discord
    </a>

    <p class="signup-link">
      New to GameWarden? <a href="Register.html">Create an account</a>
    </p>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <a class="nav-logo" href="index.html" style="font-size:0.9rem;">
    <div class="logo-mark" style="width:24px;height:24px;font-size:0.65rem;border-radius:6px;">GW</div>
    GameWarden
  </a>
  <div class="footer-links">
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">Support</a>
  </div>
  <div class="footer-copy">© 2025 GameWarden. All rights reserved.</div>
</footer>

<script>
const pwInput  = document.getElementById('password');
const togglePw = document.getElementById('toggle-pw');
const eyeIcon  = document.getElementById('eye-icon');
const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
togglePw.addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  eyeIcon.innerHTML = show ? eyeClosed : eyeOpen;
});

const btn           = document.getElementById('btn-submit');
const emailField    = document.getElementById('field-email');
const passwordField = document.getElementById('field-password');
const emailInput    = document.getElementById('email');
const errorBanner   = document.getElementById('error-banner');

function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

function clearErrors() {
  emailField.classList.remove('error');
  passwordField.classList.remove('error');
  errorBanner.classList.remove('visible');
}

emailInput.addEventListener('input', () => emailField.classList.remove('error'));
pwInput.addEventListener('input',    () => passwordField.classList.remove('error'));

btn.addEventListener('click', () => {
  clearErrors();
  const email = emailInput.value.trim();
  const pass  = pwInput.value;
  let ok = true;

  if (!isValidEmail(email))   { emailField.classList.add('error');    ok = false; }
  if (pass.length < 1)        { passwordField.classList.add('error'); ok = false; }
  if (!ok) return;

  // Simulate login request - replace with real auth
  btn.classList.add('loading');
  setTimeout(() => {
    btn.classList.remove('loading');
    errorBanner.classList.add('visible');
  }, 1400);
});

[emailInput, pwInput].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); })
);
</script>
</body>
</html>
